name: Code Analysis

on: pull_request

# Cancels all previous workflow runs for pull requests that have not completed.
concurrency:
    # The concurrency group contains the workflow name and the branch name for pull requests
    # or the commit hash for any other events.
    group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.head_ref || github.sha }}
    cancel-in-progress: true

jobs:
    analysis:
        runs-on: ubuntu-latest

        strategy:
            matrix:
                node: ['18.15']
                php: ['8.2']

        steps:
            - name: Checkout
              uses: actions/checkout@v2

            - name: Initialize mandatory git config
              run: |
                  git config user.name "Navanath Bhosale"
                  git config user.email "navanathb@bsf.io"

            - name: Use desired version of NodeJS
              uses: actions/setup-node@v2
              with:
                  node-version: ${{ matrix.node }}

            - name: Cache NPM packages
              uses: actions/cache@v4
              with:
                  # npm cache files are stored in `~/.npm` on Linux/macOS
                  path: ~/.npm
                  key: ${{ runner.os }}-node-${{ matrix.node }}-npm-cache-${{ hashFiles('**/package-lock.json') }}

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: ${{ matrix.php }}
                  coverage: none
                  tools: composer, cs2pr, phpcs

            - name: Install dependencies
              run: composer install --prefer-dist --no-suggest --no-progress && npm install --legacy-peer-deps

            - name: Run phpcs
              id: phpcs
              if: always()
              run: ./vendor/bin/phpcs --report-full --report-checkstyle=./phpcs-report.xml

            - name: Run phpinsights
              id: phpinsights
              if: always()
              run: ./vendor/bin/phpinsights --no-interaction --min-quality=100 --min-architecture=100 --min-style=100

            - name: Show PHPCS results in PR
              if: ${{ always() && steps.phpcs.outcome == 'failure' }}
              run: cs2pr ./phpcs-report.xml

            - name: Prettier Check
              if: always()
              run: npm run pretty

            - name: Lint JS
              if: always()
              run: npm run lint-js

            - name: Lint CSS
              if: always()
              run: npm run lint-css

            - name: PHP static analysis
              if: always()
              run: composer run phpstan
